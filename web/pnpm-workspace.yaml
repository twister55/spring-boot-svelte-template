# pnpm 10+ reads project settings from here, not from the "pnpm" field in package.json.

# Native postinstall builds we trust and want to run (pnpm blocks build scripts by default).
# - esbuild: bundler binary used by vite/vitest.
# - unrs-resolver: native binding for eslint-import-resolver-typescript.
onlyBuiltDependencies:
  - esbuild
  - unrs-resolver

# Explicit allow/deny decisions required by the strict supply-chain policy.
allowBuilds:
  unrs-resolver: true

# vite 8.1.4 pulls rolldown via "~1.1.3", which would resolve to the newest 1.1.x.
# Pin rolldown so installs stay reproducible and clear of the registry's
# minimum-release-age (supply-chain) policy that blocks just-published versions.
overrides:
  rolldown: 1.1.4
