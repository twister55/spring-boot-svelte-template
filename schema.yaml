openapi: '3.1.0'
info:
  title: spring-boot-svelte-template
  version: v1
servers:
  - url: http://localhost:8080
paths:
  /api/v1/todos:
    get:
      tags:
        - todo
      operationId: getTodos
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TodoDto'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags:
        - todo
      operationId: createTodo
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/TodoWriteDto'
      responses:
        '201':
          description: Created
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TodoDto'
        default:
          $ref: '#/components/responses/Error'
  /api/v1/todos/{id}:
    get:
      tags:
        - todo
      operationId: getTodo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TodoDto'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags:
        - todo
      operationId: updateTodo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/TodoWriteDto'
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/TodoDto'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags:
        - todo
      operationId: deleteTodo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  schemas:
    TodoDto:
      allOf:
        - $ref: '#/components/schemas/TodoWriteDto'
        - type: object
          required:
            - id
            - createdAt
          properties:
            id:
              type: integer
              format: int64
            createdAt:
              type: string
              format: date-time

    TodoWriteDto:
      type: object
      required:
        - title
        - completed
      properties:
        title:
          type: string
          minLength: 1
        completed:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          format: int32
        message:
          type: string
        timestamp:
          type: string
          format: date-time
  responses:
    Error:
      description: Error response
      content:
        'application/json':
          schema:
            $ref: '#/components/schemas/ErrorResponse'
