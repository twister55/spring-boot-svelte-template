openapi: '3.1.0'
info:
  title: spring-boot-svelte-template
  version: v1
servers:
  - url: http://localhost:8080
paths:
  /api/v1/status:
    get:
      tags:
        - status
      operationId: getStatus
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/StatusDto'
        default:
          $ref: '#/components/responses/Error'
  /api/v1/status/{code}:
    get:
      tags:
        - status
      operationId: getStatusByCode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/StatusDto'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  schemas:
    StatusDto:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required:
        - status
        - message
        - timestamp
      properties:
        status:
          type: integer
          format: int32
        message:
          type: string
        timestamp:
          type: string
          format: date-time
  responses:
    Error:
      description: Error response
      content:
        'application/json':
          schema:
            $ref: '#/components/schemas/ErrorResponse'
