# Development-only infrastructure. Harden before using anything like this in production.
services:
  postgresql:
    image: postgres:17
    volumes:
      - ./.volumes/postgresql/:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=app
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    ports:
      - "5432:5432"
    # lets `docker compose up -d --wait` block until PostgreSQL actually accepts
    # connections (first run pays initdb) instead of returning on container start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 2s
      timeout: 3s
      retries: 15
